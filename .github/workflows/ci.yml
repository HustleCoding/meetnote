name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Light deps only — the macOS-only (rumps) and heavy (faster-whisper)
          # deps are lazily imported and not needed for the unit tests.
          pip install psutil requests pytest ruff "tomli; python_version < '3.11'"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
